# Builds the Doxygen API site and publishes it to GitHub Pages.
#
# Triggered on every push to `main`. Runs Doxygen against the source
# tree at the pushed revision — the rendered HTML is NOT checked into
# the repo (docs/html/ stays gitignored to avoid churning the diff with
# generated output and bloating clones).
name: Deploy Doxygen site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Token scopes needed by the upload + deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel an in-progress production deploy if a new push lands.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen + Graphviz
        # Graphviz powers Doxygen's `dot` collaboration / include graphs;
        # the Doxyfile sets HAVE_DOT = YES so without it the build either
        # warns loudly or skips the graphs.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Generate API docs
        # Doxyfile sets OUTPUT_DIRECTORY=docs and HTML_OUTPUT=html, so
        # the rendered site lands at docs/html/ regardless of where we
        # ran from.
        run: doxygen Doxyfile

      - name: Sanity-check generated tree
        run: |
          test -f docs/html/index.html || {
            echo "::error::Doxygen produced no docs/html/index.html" >&2
            exit 1
          }
          echo "Generated $(find docs/html -type f | wc -l) files."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
