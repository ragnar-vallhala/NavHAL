name: Renode (PIL)

# PIL (Processor-in-the-Loop) — runs the on-target ELF in a
# Renode-emulated STM32F4. Wired as a per-PR gate: triggers on push +
# pull_request to main, plus the nightly schedule (belt-and-suspenders)
# and workflow_dispatch for ad-hoc runs.
#
# The 150-min timeout below is a safety cap, not a typical-runtime
# guess. See docs/testing/model.md §"PIL" for what the run covers.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: renode-${{ github.ref }}
  cancel-in-progress: true

jobs:
  renode:
    name: Full suite in Renode
    runs-on: ubuntu-latest
    timeout-minutes: 150  # Renode RunFor cap is 3h emulated; wall-clock is shorter.
    steps:
      - uses: actions/checkout@v4
      - name: Install arm-none-eabi toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
      - name: Install kconfiglib
        run: pip install kconfiglib
      - name: Build on-target ELF
        run: |
          cmake -B build-test -DTEST=ON
          cmake --build build-test --target tests -j
          arm-none-eabi-size build-test/tests
      - name: Install Renode
        run: |
          RENODE_VERSION=1.16.1
          RENODE_DEB=renode_${RENODE_VERSION}_amd64.deb
          curl -sSL -o "$RENODE_DEB" \
            "https://github.com/renode/renode/releases/download/v${RENODE_VERSION}/${RENODE_DEB}"
          sudo apt-get install -y "./${RENODE_DEB}"
          renode --version
      - name: Run navtest in Renode
        run: tools/renode/run_tests.sh build-test/tests
