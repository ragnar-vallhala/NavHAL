# PIL board definition — Nucleo-F401RE (Cortex-M4 / STM32F4).
# Sourced as shell by tools/pil/run.sh. Variables are required unless
# marked optional.

ARCH=cortex-m4
TOOLCHAIN_FILE=cmake/toolchains/arm-none-eabi-toolchain.cmake
BUILD_DIR=build-test
RUNNER=tools/renode/run_tests.sh

# Optional: apt packages a fresh CI runner needs to install before this
# board's PIL job can run. Used by tools/pil/run.sh --install-deps.
APT_DEPS="gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi"

# Renode isn't apt-packaged on stable Ubuntu; tools/pil/run.sh runs
# this script during --install-deps to fetch it from upstream.
SETUP_SCRIPT=tools/pil/setup/install-renode.sh
