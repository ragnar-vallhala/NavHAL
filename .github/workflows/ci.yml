name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, stable]   # `stable` so the release-gate PR also runs the per-PR suite
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Enforce Conventional Commits on every commit added in a PR. Catches
  # --no-verify bypasses of the local .githooks/commit-msg hook. Only runs
  # on pull_request; main's history is treated as immutable.
  commit-lint:
    name: Commit message lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint commit messages
        run: tools/lint_commits.sh origin/${{ github.base_ref }}..HEAD

  # Fast pure-logic tests with the host gcc. Self-contained — no toolchain
  # download, no emulator.
  host-tests:
    name: Host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure host build
        run: cmake -B build-host -S tests/host
      - name: Build host tests
        run: cmake --build build-host -j
      - name: Run host tests
        run: ./build-host/tests_host

  # Cross-compile the on-target navtest ELF. Uploads the binary as a
  # workflow artifact so the (separate) renode.yml workflow can consume
  # it without rebuilding.
  build-on-target:
    name: Build on-target ELF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install arm-none-eabi toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
      - name: Install kconfiglib
        run: pip install kconfiglib
      - name: Configure
        run: cmake -B build-test -DTEST=ON
      - name: Build tests
        run: cmake --build build-test --target tests -j
      - name: Report ELF size
        run: arm-none-eabi-size build-test/tests
      - name: Upload tests.elf
        uses: actions/upload-artifact@v4
        with:
          name: tests-elf
          path: build-test/tests
          retention-days: 7

  # NOTE: PIL (Renode) runs live in `.github/workflows/renode.yml`,
  # gated on the same push + pull_request events. The `Full suite in
  # Renode` job there should also be a required-status-check.

  # NAVHAL_HAS_* capability contract — verifies that disabling a cap in
  # Kconfig actually drops its driver symbols from the test ELF, AND that
  # sub-cap flags (DRV_UART_DMA / DRV_I2C_DMA / DRV_SDIO_DMA) isolate per
  # driver. Catches regressions in:
  #   - navhal_port_config.h (hardcoded _X_ENABLED defines)
  #   - Kconfig select cascades
  #   - missing #ifdef guards in driver .c files
  #   - fpu.c-style #else stubs that leak the symbol when the cap is off
  cap-contract:
    name: Capability contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install arm-none-eabi toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
      - name: Install kconfiglib
        run: pip install kconfiglib
      - name: Run cap contract tests
        run: tools/test_cap_contract.sh

  # Catches missing `select` clauses on SAMPLE_* Kconfig entries: a sample
  # that needs DRV_SDIO but doesn't select it will silently fall back to
  # default Kconfig state and fail to link. Builds every cortex-m sample
  # (cheap — ~1s each).
  sample-matrix:
    name: Build all samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install arm-none-eabi toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
      - name: Install kconfiglib
        run: pip install kconfiglib
      - name: Build every sample
        run: tools/build_all_samples.sh

  # Same idea but on the AVR (ATmega328P) port. Builds only samples in
  # samples/portable/ — those are the contract for "runs on both arches".
  # Catches AVR-port regressions and breakage in the portable-sample tier.
  sample-matrix-avr:
    name: Build all AVR samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install avr toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-avr avr-libc binutils-avr
      - name: Install kconfiglib
        run: pip install kconfiglib
      - name: Build every portable sample under AVR config
        run: tools/build_all_avr_samples.sh
