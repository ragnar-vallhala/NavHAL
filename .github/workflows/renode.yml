name: PIL (per-arch)

# Per-arch PIL (Processor-in-the-Loop). One matrix job per board defined
# under tools/pil/boards/<name>.conf. Adding a new MCU is:
#
#   1. tools/pil/boards/<name>.conf  (arch, toolchain file, runner, deps)
#   2. optional tools/pil/setup/<name>.sh  (non-apt deps; install-renode.sh
#      is the example)
#   3. add the board name to the matrix list below
#
# That's it — no per-board step blocks. tools/pil/run.sh dispatches.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, stable]
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: pil-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pil:
    name: PIL ${{ matrix.board }}
    runs-on: ubuntu-latest
    timeout-minutes: 150  # generous cap; AVR finishes in seconds, Renode in minutes
    strategy:
      fail-fast: false
      matrix:
        board: [nucleo_f401re, atmega328p]
    steps:
      - uses: actions/checkout@v4
      - name: Install kconfiglib
        run: pip install kconfiglib
      - name: Install ${{ matrix.board }} deps
        run: tools/pil/run.sh ${{ matrix.board }} --install-deps
      - name: Build + run PIL for ${{ matrix.board }}
        run: tools/pil/run.sh ${{ matrix.board }}
