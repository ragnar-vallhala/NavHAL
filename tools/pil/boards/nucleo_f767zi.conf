# PIL board definition — Nucleo-F767ZI (Cortex-M7 / STM32F7).
# Sourced as shell by tools/pil/run.sh. Variables are required unless
# marked optional.

ARCH=cortex-m7
TOOLCHAIN_FILE=cmake/toolchains/arm-none-eabi-f767-toolchain.cmake
BUILD_DIR=build-test-f767
RUNNER=tools/renode/run_tests.sh

# Optional: extra opt-in caps for the PIL test ELF, layered on DEFCONFIG by
# tools/pil/run.sh. DRV_SDIO enables the polled SDIO suite — including the
# block write/read round-trip against the Renode SD card wired in the .resc —
# which is off in the shipped default. Polled only (no DRV_SDIO_DMA on M7).
DEFCONFIG=cmake/defconfigs/cortex-m7_stm32f7_nucleo_f767zi.defconfig
TEST_EXTRA_CONFIG="CONFIG_DRV_SDIO=y"

# Optional: Renode script for this board. run_tests.sh honours $RESC and
# resolves a relative path against the repo root. The F767 console is USART3
# and the model is Renode's mainline STM32F746 CPU platform.
RESC=tools/renode/navhal_f767zi.resc

# Optional: apt packages a fresh CI runner needs before this board's PIL job.
APT_DEPS="gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi"

# Renode isn't apt-packaged on stable Ubuntu; tools/pil/run.sh runs this
# during --install-deps to fetch it from upstream.
SETUP_SCRIPT=tools/pil/setup/install-renode.sh
