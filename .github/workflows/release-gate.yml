# Release gate — runs on a PR from main to stable.
#
# Adds heavier checks on top of the per-PR suite (ci.yml + renode.yml,
# which also fire on PRs to `stable` because their pull_request.branches
# include both `main` and `stable`). The full chain that gates a
# main → stable promotion is:
#
#   from ci.yml         : Host tests, Build on-target ELF, Capability
#                         contract, Build all samples, Build all AVR
#                         samples, Commit message lint
#   from renode.yml     : Full suite in Renode (PIL)
#   from this workflow  : License headers, Doxygen strict, Sanitizer
#                         host tests, Reproducible build (soft),
#                         and the aggregator `Release gate complete`.
#
# Make `Release gate complete` a required status check on the `stable`
# branch protection rule — that single name covers the whole heavier
# tier. The individual ci.yml/renode.yml checks should also be required.

name: Release gate

on:
  pull_request:
    branches: [stable]
  workflow_dispatch:

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Every source file must carry the Apache 2.0 header. The bulk
  # apply ran when we relicensed; this check makes sure no new file
  # has snuck in without one between releases.
  license-headers:
    name: License header on every source file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Apache 2.0 header
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          while IFS= read -r f; do
            head -5 "$f" | grep -q "Apache License" || missing+=("$f")
          done < <(find src include tests samples -type f \
              \( -name '*.c' -o -name '*.h' -o -name '*.cpp' -o -name '*.hpp' -o -name '*.s' \))
          total=$(find src include tests samples -type f \
              \( -name '*.c' -o -name '*.h' -o -name '*.cpp' -o -name '*.hpp' -o -name '*.s' \) | wc -l)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::${#missing[@]} of $total source files are missing the Apache header"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi
          echo "ok: all $total source files carry the Apache 2.0 header"

  # WARN_AS_ERROR catches missing @param, broken @ref, undocumented
  # public symbols, malformed groups, etc. We tolerate warnings on
  # `main` builds (Pages deploy still publishes), but reject them at
  # the release gate.
  doxygen-strict:
    name: Doxygen builds warning-free
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install doxygen + graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz
      - name: Build docs with WARN_AS_ERROR
        run: |
          # Overwrite the WARN_AS_ERROR line in a copy of the Doxyfile
          # rather than modifying the tracked file. `FAIL_ON_WARNINGS`
          # would also work in newer Doxygen but isn't universal.
          sed 's|^WARN_AS_ERROR\s*=.*|WARN_AS_ERROR = YES|' Doxyfile > Doxyfile.strict
          doxygen Doxyfile.strict

  # Host tests under AddressSanitizer + UndefinedBehaviorSanitizer.
  # Catches use-after-free / out-of-bounds / signed overflow / null
  # deref / divide-by-zero in conversion.c, the software CRC table,
  # GPIO pin encoding helpers, etc. Plain host tests (ci.yml) build
  # without -fsanitize so they don't catch these classes of bugs.
  sanitizer-host:
    name: Host tests under ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure with sanitizers
        run: |
          cmake -B build-host-san -S tests/host \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g -O1" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        run: cmake --build build-host-san -j
      - name: Run
        env:
          ASAN_OPTIONS: "halt_on_error=1:abort_on_error=1:detect_leaks=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
        run: ./build-host-san/tests_host

  # Soft reproducibility check — builds the test ELF twice in a fresh
  # checkout, compares the stripped .bin. We don't yet ship
  # -fdebug-prefix-map / SOURCE_DATE_EPOCH wiring, so this is allowed
  # to differ today; the job records the diff and warns. When that
  # plumbing lands, flip the `continue-on-error` below to false so
  # bit-reproducibility becomes a hard gate.
  reproducible-build:
    name: Reproducible build (soft)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install arm-none-eabi + kconfiglib
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
          pip install kconfiglib
      - name: Build A
        run: |
          cmake -B build-a -DTEST=ON >/dev/null
          cmake --build build-a --target tests -j >/dev/null
          arm-none-eabi-objcopy -O binary build-a/tests build-a/tests.bin
      - name: Build B (fresh)
        run: |
          rm -f .config
          rm -rf build-b
          cmake -B build-b -DTEST=ON >/dev/null
          cmake --build build-b --target tests -j >/dev/null
          arm-none-eabi-objcopy -O binary build-b/tests build-b/tests.bin
      - name: Compare
        run: |
          if cmp -s build-a/tests.bin build-b/tests.bin; then
            echo "::notice::tests.bin is bit-for-bit reproducible"
          else
            echo "::warning::tests.bin differs across builds."
            echo "Add -fdebug-prefix-map and SOURCE_DATE_EPOCH support to fix."
            cmp build-a/tests.bin build-b/tests.bin || true
          fi

  # Single status-check name to add to stable's branch protection rule.
  # Aggregates the four jobs above; uses `if: always()` so it runs even
  # if a dependency failed (otherwise the aggregator would be skipped
  # and the protection check would never resolve).
  release-gate-complete:
    name: Release gate complete
    runs-on: ubuntu-latest
    needs: [license-headers, doxygen-strict, sanitizer-host, reproducible-build]
    if: always()
    steps:
      - name: Aggregate results
        run: |
          fail=0
          report() {
            local name=$1 result=$2
            if [ "$result" = "success" ]; then
              printf '  \033[32mPASS\033[0m  %s\n' "$name"
            elif [ "$result" = "skipped" ]; then
              printf '  \033[33mSKIP\033[0m  %s (treated as failure for required gates)\n' "$name"
              fail=1
            else
              printf '  \033[31mFAIL\033[0m  %s (%s)\n' "$name" "$result"
              fail=1
            fi
          }
          report "license-headers"    "${{ needs.license-headers.result }}"
          report "doxygen-strict"     "${{ needs.doxygen-strict.result }}"
          report "sanitizer-host"     "${{ needs.sanitizer-host.result }}"
          # reproducible-build is soft (continue-on-error: true) — it
          # reports its own result but never fails the gate today.
          echo "  INFO  reproducible-build: ${{ needs.reproducible-build.result }} (soft)"
          [ $fail -eq 0 ] && echo "Release gate green."
          exit $fail
